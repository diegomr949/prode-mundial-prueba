# application-test.yml — perfil de tests sin JWT
spring:
  datasource:
    url:               jdbc:h2:mem:prode_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username:          sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: never

  session:
    timeout: 1h

cors:
  allowed-origins: http://localhost:3000

rate-limit:
  auth-requests-per-minute: 1000
  api-requests-per-minute:  1000

logging:
  level:
    root:                         WARN
    ar.org.cpcemza.prodemundial:  DEBUG