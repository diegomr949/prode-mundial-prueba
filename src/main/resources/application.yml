# ═══════════════════════════════════════════════════════════
# application.yml — CPCE Mendoza · Prode Mundial 2026
#
# Versión SIN JWT — autenticación por sesión de servidor.
# Variables de entorno obligatorias: DB_URL, DB_USERNAME,
# DB_PASSWORD, CORS_ALLOWED_ORIGINS.
# ═══════════════════════════════════════════════════════════

spring:
  application:
    name: prode-mundial

  # ── Base de datos ──────────────────────────────────────
  datasource:
    url:               ${DB_URL}
    username:          ${DB_USERNAME}
    password:          ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:     10
      minimum-idle:           2
      connection-timeout:  30000
      idle-timeout:       600000
      max-lifetime:      1800000
      connection-test-query: SELECT 1

  # ── JPA ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql:    false
        dialect:       org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

  # ── SQL init ───────────────────────────────────────────
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  # ── Sesión HTTP ────────────────────────────────────────
  session:
    timeout: ${SESSION_TIMEOUT:8h}    # cierra sesión tras 8 hs de inactividad

server:
  port: ${PORT:8080}
  tomcat:
    max-threads:        200
    accept-count:       100
    connection-timeout: 20000
  forward-headers-strategy: framework
  # Cookie de sesión: HttpOnly + Secure en producción
  servlet:
    session:
      cookie:
        http-only: true
        secure:    ${SESSION_COOKIE_SECURE:true}
        same-site: Lax
        name:      PRODE_SESSION

# ── CORS ──────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ── Rate limiting ─────────────────────────────────────────
rate-limit:
  auth-requests-per-minute: ${RATE_LIMIT_AUTH:10}
  api-requests-per-minute:  ${RATE_LIMIT_API:120}

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root:                          WARN
    ar.org.cpcemza.prodemundial:   ${LOG_LEVEL:INFO}
    org.springframework.security:  WARN
    org.hibernate.SQL:             ${SQL_LOG_LEVEL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"